<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacacoSpeak 🍌</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        button, input, select {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' style='font-size:20px'><text y='20'>🍌</text></svg>") 4 4, pointer !important;
        }

        /* 
         * VARIÁVEIS DE CORES DINÂMICAS 
         * O aplicativo inteiro puxa as cores daqui. Quando o tema muda, as variáveis mudam!
         */
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            /* Suaviza a troca de temas */
            transition: background-color 0.5s ease, background-image 0.5s ease;
        }
        
        /* 1. TEMA BANANA (AMARELO/MARROM) - PADRÃO */
        body.fundo-banana {
            --t-bg: #FFF3B0;
            --t-side: rgba(255, 235, 150, 0.65);
            --t-box: rgba(109, 76, 65, 0.85);
            --t-border: #5D4037;
            --t-text-box: #FFE082;
            --t-text: #4E342E;
            --t-msg-minha: #FFE082;
            --t-msg-outra: #FFF8DC;
            background-color: var(--t-bg);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><text y='55' x='20' font-size='40' opacity='0.6'>🍌</text></svg>");
        }

        /* 2. TEMA MACONHEIRO (VERDES PASTEL) */
        body.fundo-cannabis {
            --t-bg: #A3E4D7;
            --t-side: rgba(163, 228, 215, 0.65);
            --t-box: rgba(30, 132, 73, 0.85);
            --t-border: #1E8449;
            --t-text-box: #D5F5E3;
            --t-text: #145A32;
            --t-msg-minha: #A9DFBF;
            --t-msg-outra: #E8F8F5;
            background-color: var(--t-bg);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><text y='60' x='30' font-size='40' opacity='0.7'>🐵</text><text y='70' x='25' font-size='25' opacity='0.6'>🌿</text><text y='60' x='60' font-size='25' opacity='0.5'>💨</text></svg>");
        }

        /* 3. TEMA GAY (ROSAS E LILÁS) */
        body.fundo-gay {
            --t-bg: #F8C8DC;
            --t-side: rgba(248, 200, 220, 0.65);
            --t-box: rgba(136, 14, 79, 0.85);
            --t-border: #880E4F;
            --t-text-box: #FCE4EC;
            --t-text: #4A148C;
            --t-msg-minha: #F48FB1;
            --t-msg-outra: #FCE4EC;
            background-color: var(--t-bg);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><text y='60' x='30' font-size='40' opacity='0.7'>🐵</text><text y='52' x='33' font-size='32' opacity='0.7'>🕶️</text><text y='68' x='42' font-size='20' opacity='0.7'>💋</text></svg>");
        }

        /* 4. HORA DE DORMIR (DARK MODE PASTEL) */
        body.fundo-noite {
            --t-bg: #3D3B4C;
            --t-side: rgba(61, 59, 76, 0.75);
            --t-box: rgba(26, 25, 36, 0.85);
            --t-border: #1A1924;
            --t-text-box: #D1C4E9;
            --t-text: #E8EAF6;
            --t-msg-minha: #5C6BC0;
            --t-msg-outra: #3949AB;
            background-color: var(--t-bg);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><text y='35' x='15' font-size='20' opacity='0.3'>⭐</text><text y='80' x='60' font-size='35' opacity='0.4'>🙈</text></svg>");
        }

        /* 5. TEMA AUTISTA (ESPECTRO ARCO-ÍRIS PASTEL E CINZA CHUMBO) */
        body.fundo-autista {
            --t-bg: transparent; /* O bg aqui é o gradiente na imagem */
            --t-side: rgba(255, 255, 255, 0.45);
            --t-box: rgba(74, 74, 74, 0.9);
            --t-border: #4A4A4A;
            --t-text-box: #FFF;
            --t-text: #333;
            --t-msg-minha: #BAE1FF;
            --t-msg-outra: #FFF;
            /* Combina as marcas d'água com o Gradiente Pastel do Espectro */
            background-image: 
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><text y='60' x='30' font-size='40' opacity='0.6'>🐵</text><text y='48' x='22' font-size='24' opacity='0.6'>🧩</text><text y='85' x='25' font-size='32' opacity='0.5'>🦖</text><text y='55' x='75' font-size='32' opacity='0.5'>👽</text></svg>"), 
                linear-gradient(45deg, #FFB3BA, #FFDFBA, #FFFFBA, #BAFFC9, #BAE1FF);
        }

        /* 6. TEMA NUVEM FELIZ (AZUL CÉU) */
        body.fundo-nuvem {
            --t-bg: #A1C4FD;
            --t-side: rgba(161, 196, 253, 0.65);
            --t-box: rgba(21, 101, 192, 0.85);
            --t-border: #1565C0;
            --t-text-box: #E3F2FD;
            --t-text: #0D47A1;
            --t-msg-minha: #90CAF9;
            --t-msg-outra: #E3F2FD;
            background-color: var(--t-bg);
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><text y='70' x='15' font-size='50' opacity='0.6'>☁️</text><text y='60' x='35' font-size='25' opacity='0.8'>🐵</text></svg>");
        }

        /* --- APLICAÇÃO DAS VARIÁVEIS NA INTERFACE --- */

        .sidebar {
            background-color: var(--t-side);
            backdrop-filter: blur(4px);
            width: 280px; padding: 15px;
            display: flex; flex-direction: column;
            z-index: 10; overflow-y: auto; flex-shrink: 0;
            border-right: 2px solid var(--t-border);
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }
        
        h2 { 
            margin-top: 0; font-size: 24px; text-align: center; 
            color: var(--t-border); 
            text-shadow: 1px 1px 0px var(--t-text-box); 
            padding-bottom: 10px; margin-bottom: 10px;
            transition: color 0.5s ease;
        }
        
        .apelido-container, .amigo-box {
            background-color: var(--t-box); padding: 12px; border-radius: 12px;
            margin-bottom: 12px; border: 2px solid var(--t-border); text-align: left;
            box-shadow: 0 3px 0 var(--t-border);
            transition: all 0.5s ease;
        }
        .apelido-container label, .amigo-box { 
            font-size: 13px; font-weight: bold; color: var(--t-text-box); display: block; 
            transition: color 0.5s ease;
        }
        
        .input-group { display: flex; gap: 6px; margin-top: 8px; width: 100%; align-items: stretch; }
        
        input[type="text"], select {
            flex: 1; min-width: 0; padding: 0 10px; border-radius: 10px; 
            border: 2px solid var(--t-border); font-weight: bold; font-size: 14px; 
            outline: none; font-family: inherit;
            background-color: var(--t-msg-outra); color: var(--t-text); 
            height: 38px; margin: 0;
            transition: all 0.5s ease;
        }
        input::placeholder { color: var(--t-text); opacity: 0.6; }
        
        #btn-ok-apelido {
            flex-shrink: 0; width: auto; padding: 0 12px; 
            background-color: #78E08F; color: #2E7D32; 
            border-radius: 10px; border: 2px solid #2E7D32; font-family: inherit; font-weight: bold;
            box-shadow: 0 3px 0 #2E7D32; height: 38px; margin: 0;
            display: flex; align-items: center; justify-content: center; font-size: 14px; transition: 0.1s;
        }
        #btn-ok-apelido:hover:not(:disabled) { background-color: #B8E994; }
        #btn-ok-apelido:active:not(:disabled) { transform: translateY(3px); box-shadow: none; }

        .salas { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        
        /* Botões padronizados e harmônicos */
        button {
            background-color: #F8C291; color: #5D4037; border: 2px solid #E58E26; 
            padding: 10px; border-radius: 12px; font-weight: bold; font-size: 14px;
            box-shadow: 0 3px 0 #E58E26; transition: 0.1s; font-family: inherit; cursor: pointer;
        }
        button:hover:not(:disabled) { background-color: #FAD390; }
        button:active:not(:disabled) { transform: translateY(3px); box-shadow: none; }
        
        .btn-ativo { background-color: #78E08F !important; box-shadow: 0 3px 0 #2E7D32 !important; border-color: #2E7D32 !important; color: #1B5E20;}
        .btn-mute { background-color: #82CCDD; box-shadow: 0 3px 0 #60A3BC; border-color: #60A3BC; margin-top: 5px; width: 100%; color: #0A3D62; }
        .btn-muted { background-color: #F19066 !important; box-shadow: 0 3px 0 #C44569 !important; border-color: #C44569 !important; color: #FFF; }
        .btn-ruido { background-color: #FDA7DF; box-shadow: 0 3px 0 #D980FA; border-color: #D980FA; margin-top: 5px; width: 100%; color: #574B90;}

        .chat-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 16px;
            background-color: var(--t-side);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--t-border);
            z-index: 5;
            transition: all 0.5s ease;
        }

        .chat-topbar .seletor-cenario {
            width: 260px;
            background-color: var(--t-box);
            border: 2px solid var(--t-border);
            border-radius: 12px;
            box-shadow: 0 3px 0 var(--t-border);
            padding: 8px;
            transition: all 0.5s ease;
        }

        .chat-topbar .seletor-cenario label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: var(--t-text-box);
            margin-bottom: 6px;
            transition: color 0.5s ease;
        }

        .chat-topbar .seletor-cenario #select-fundo {
            margin-top: 0;
        }

        .chat-topbar-esquerda {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .badge-status {
            background-color: var(--t-box);
            color: var(--t-text-box);
            border: 2px solid var(--t-border);
            border-radius: 999px;
            box-shadow: 0 3px 0 var(--t-border);
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.5s ease;
        }

        .badge-status.online {
            background-color: rgba(120, 224, 143, 0.85);
            color: #1B5E20;
        }

        .badge-status.offline {
            background-color: rgba(241, 144, 102, 0.85);
            color: #5D4037;
        }

        .badge-status.connecting {
            background-color: rgba(248, 194, 145, 0.95);
            color: #5D4037;
        }

        .toast-feedback {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%) translateY(10px);
            z-index: 50;
            background-color: var(--t-box);
            color: var(--t-text-box);
            border: 2px solid var(--t-border);
            box-shadow: 0 3px 0 var(--t-border);
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .toast-feedback.mostrar {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 900px) {
            .chat-topbar {
                justify-content: space-between;
                padding: 8px 10px;
            }

            .chat-topbar-esquerda {
                gap: 6px;
            }

            .badge-status {
                font-size: 11px;
                padding: 4px 8px;
            }

            .chat-topbar .seletor-cenario {
                width: 58%;
                min-width: 210px;
            }
        }

        @media (max-width: 600px) {
            .chat-topbar {
                flex-direction: column;
                align-items: stretch;
                padding: 7px 8px;
                gap: 7px;
            }

            .chat-topbar-esquerda {
                justify-content: space-between;
            }

            .chat-topbar .seletor-cenario {
                width: 100%;
                min-width: 0;
                padding: 7px;
            }

            .chat-topbar .seletor-cenario label {
                font-size: 11px;
                margin-bottom: 4px;
            }

            #select-fundo {
                height: 34px;
                font-size: 13px;
            }
        }
        
        input[type="range"] { accent-color: var(--t-border); height: 6px; width: 100%; margin-top: 5px; cursor: pointer;}

        /* Galho interage com as cores */
        #visual-da-arvore {
            background-color: var(--t-side); border-radius: 15px; padding: 10px; margin-top: 10px;
            position: relative; min-height: 80px; display: flex; justify-content: center; align-items: flex-end; gap: 4px;
            border: 2px dashed var(--t-border);
            transition: all 0.5s ease;
        }
        #visual-da-arvore::after {
            content: ""; position: absolute; left: 8px; right: 8px; bottom: 8px; height: 8px; background-color: var(--t-border); border-radius: 4px; z-index: 1;
            transition: background 0.5s ease;
        }
        .macaco-no-galho {
            font-size: 28px; z-index: 2; margin-bottom: 8px; display: inline-block;
        }
        .macaco-no-galho.falando {
            animation: pularMacaco 0.3s ease infinite alternate;
        }
        @keyframes pularMacaco {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-10px) scale(1.05); }
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; background-color: transparent; }
        
        /* Balões de Chat que mudam com as cores do tema */
        #chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .mensagem { 
            padding: 10px 15px; border-radius: 15px; max-width: 75%; 
            font-weight: 500; font-size: 14px; color: var(--t-text);
            background-color: var(--t-msg-outra); border: 2px solid var(--t-border); 
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1); word-break: break-word;
            transition: all 0.5s ease;
        }
        .mensagem.minha { 
            background-color: var(--t-msg-minha); align-self: flex-end; 
        }

        .mensagem.mensagem-sistema {
            opacity: 0.85;
            border-style: dashed;
            background-color: rgba(255, 255, 255, 0.45);
            align-self: center;
            max-width: 90%;
        }

        .amigo-box.falando-remoto {
            box-shadow: 0 0 0 2px rgba(120, 224, 143, 0.5), 0 3px 0 var(--t-border);
        }
        
        /* Menu Inferior Fluido */
        .chat-input-area { 
            display: flex; padding: 15px 25px; gap: 10px;
            background-color: var(--t-side); 
            backdrop-filter: blur(8px); border-top: 1px solid var(--t-border);
            align-items: center; transition: all 0.5s ease;
        }
        #chat-input { 
            flex: 1; min-width: 0; padding: 0 15px; border-radius: 12px; border: 2px solid var(--t-border); 
            font-size: 14px; outline: none; background-color: var(--t-msg-outra); color: var(--t-text); 
            font-family: inherit; height: 45px; margin: 0; transition: all 0.5s ease;
        }
        
        #btn-enviar { 
            width: auto; padding: 0 20px; background-color: #78E08F; color: #1B5E20; 
            border: 2px solid #2E7D32; box-shadow: 0 3px 0 #2E7D32; 
            height: 45px; margin: 0; display: flex; align-items: center; justify-content: center; font-size: 14px;
        }
        #btn-enviar:active { transform: translateY(3px); box-shadow: none; }
        
        #select-fundo {
            width: 100%; padding: 8px; border-radius: 10px; margin-top: 8px;
        }

        /* TELA DE BLOQUEIO MANTIDA TRANSLÚCIDA */
        #overlay-bloqueio { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); 
            display: flex; align-items: center; justify-content: center; color: #FFF8DC; 
            font-size: 26px; font-weight: bold; z-index: 20; text-align: center; padding: 20px; 
            text-shadow: 2px 2px 0 rgba(0,0,0,0.5); border-radius: 20px 0 0 20px;
        }
    </style>
</head>
<!-- Chuva de Banana definida como o padrao inicial de novo -->
<body class="fundo-banana"> 

    <div class="sidebar">
        <h2>🐵 MacacoSpeak</h2>
        
        <div class="apelido-container">
            <label>Suba seu Nome:</label>
            <div class="input-group">
                <input type="text" id="txt-apelido" placeholder="Macaquinho..." autocomplete="off">
                <button id="btn-ok-apelido" onclick="salvarApelido()" title="Salvar nome">✔️</button>
            </div>
        </div>

        <div class="salas">
            <button id="btn-arvore1" onclick="entrarNaSala('arvore-1')">🌴 Subir na Árvore 1!</button>
            <button id="btn-arvore2" onclick="entrarNaSala('arvore-2')">🌴 Subir na Árvore 2!</button>
        </div>
        
        <div id="controles-sala" style="display: none;">
            <button id="btn-mutar" class="btn-mute" onclick="mutarMicrofone()">🐵 Mic Aberto!</button>
            <button id="btn-ruido" class="btn-ruido" onclick="alternarRuido()" title="Ative quando o mic estiver com ganho alto e pegando muito som de fundo">🎧 Filtro Mágico: DESLIGADO</button>
            
            <div style="margin-top: 15px;">
                <div id="visual-da-arvore"></div>
                <div id="lista-amigos"></div>
            </div>
        </div>
    </div>
    
    <div class="chat-area">
        <div class="chat-topbar">
            <div class="chat-topbar-esquerda">
                <span id="status-conexao" class="badge-status connecting">Conectando...</span>
                <span id="status-sala-topo" class="badge-status">Sozinho na sala 🎈</span>
            </div>
            <div class="seletor-cenario">
                <label>Escolha o Cenário:</label>
                <select id="select-fundo" onchange="alterarFundo(this.value)">
                    <option value="banana">🍌 Chuva de Banana</option>
                    <option value="autista">🧩 Macaco Autista Dino & ET</option>
                    <option value="cannabis">🌿 Macaco Maconheiro</option>
                    <option value="gay">💋 Macaco Gay Fabuloso</option>
                    <option value="noite">⭐ Hora de Dormir</option>
                    <option value="nuvem">☁️ Macaco na Nuvem Feliz</option>
                </select>
            </div>
        </div>
        <div id="overlay-bloqueio">
            hola macaquito, escolha seu nome<br>e sua arvore, macaquito. 🍌
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escreva algo legal..." onkeypress="verificarEnter(event)">
            <button id="btn-enviar" onclick="enviarMensagem()">Enviar!</button>
        </div>
    </div>

    <div id="toast-feedback" class="toast-feedback"></div>

    <div id="audios"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const peers = {};
        let rtcIceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
        let localStream;
        let isMuted = false;
        let isNoiseSuppressed = false;
        let salaAtual = null;
        let apelidoLocal = "";
        let micAnalyser = null;
        let micDetectorSource = null;
        let micAnimationFrame = null;
        let speakingUntil = 0;
        let noiseFloorRms = 0.01;
        let smoothedRms = 0;
        let dynamicSpeakThreshold = 0.028;
        let ultimaAtualizacaoStatusMic = 0;
        let localProcessedStream = null;
        let processingAudioContext = null;
        let processingNodes = null;
        let currentAudioTrack = null;
        const SPEAK_THRESHOLD = 0.028;
        const SPEAK_HOLD_MS = 220;
        let roomCounts = { 'arvore-1': 0, 'arvore-2': 0 };
        const NICKNAME_STORAGE_KEY = 'macacospeak.apelido';
        const THEME_STORAGE_KEY = 'macacospeak.tema';
        const LAST_ROOM_STORAGE_KEY = 'macacospeak.lastRoom';
        let toastTimer = null;
        let remoteAudioContext = null;
        const remoteSpeakingState = {};
        const remoteAnalysers = {};
        const remoteRafIds = {};
        const remoteNicknames = {};

        function mostrarToast(texto) {
            const toast = document.getElementById('toast-feedback');
            if (!toast) return;

            toast.textContent = texto;
            toast.classList.add('mostrar');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('mostrar');
            }, 2200);
        }

        function atualizarEstadoApelido(bloqueado) {
            const input = document.getElementById('txt-apelido');
            const btnOk = document.getElementById('btn-ok-apelido');
            if (!input || !btnOk) return;

            input.disabled = bloqueado;
            btnOk.innerText = bloqueado ? '✏️' : '✔️';
            btnOk.title = bloqueado ? 'Editar nome' : 'Salvar nome';
            btnOk.style.backgroundColor = bloqueado ? '#F8C291' : '#78E08F';
            btnOk.style.borderColor = bloqueado ? '#E58E26' : '#2E7D32';
            btnOk.style.boxShadow = bloqueado ? '0 3px 0 #E58E26' : '0 3px 0 #2E7D32';
        }

        function ajustarEspacamentoChatPorTopbar() {
            const topbar = document.querySelector('.chat-topbar');
            const chatMessages = document.getElementById('chat-messages');
            if (!topbar || !chatMessages) return;

            const altura = topbar.offsetHeight || 54;
            const paddingTop = Math.max(16, Math.round(16 + (altura - 54) * 0.65));
            chatMessages.style.paddingTop = `${paddingTop}px`;
        }

        function atualizarTituloAmigo(userId) {
            const label = document.getElementById(`label-${userId}`);
            if (!label) return;
            const nick = remoteNicknames[userId] || 'Amiguinho';
            const falando = !!remoteSpeakingState[userId];
            label.textContent = falando ? `🔊 Vol. ${nick}:` : `🐵 Vol. ${nick}:`;
        }

        function setFalandoRemoto(userId, falando) {
            const valor = !!falando;
            if (remoteSpeakingState[userId] === valor) return;
            remoteSpeakingState[userId] = valor;
            const caixa = document.getElementById(`caixa-${userId}`);
            if (caixa) caixa.classList.toggle('falando-remoto', valor);
            const macaco = document.getElementById(`macaco-${userId}`);
            if (macaco) macaco.classList.toggle('falando', valor);
            atualizarTituloAmigo(userId);
        }

        function iniciarDetectorFalaRemota(userId, stream) {
            if (remoteRafIds[userId]) {
                cancelAnimationFrame(remoteRafIds[userId]);
                delete remoteRafIds[userId];
            }

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;

            if (!remoteAudioContext || remoteAudioContext.state === 'closed') {
                remoteAudioContext = new AudioContextClass();
            }

            let source;
            try {
                source = remoteAudioContext.createMediaStreamSource(stream);
            } catch (_) {
                return;
            }

            const analyser = remoteAudioContext.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.7;
            source.connect(analyser);

            remoteAnalysers[userId] = {
                source,
                analyser,
                data: new Float32Array(analyser.fftSize),
                speakingUntil: 0,
                smooth: 0
            };

            const loop = () => {
                const state = remoteAnalysers[userId];
                if (!state) return;

                state.analyser.getFloatTimeDomainData(state.data);
                let sum = 0;
                for (let i = 0; i < state.data.length; i++) sum += state.data[i] * state.data[i];
                const rms = Math.sqrt(sum / state.data.length);
                state.smooth = state.smooth * 0.84 + rms * 0.16;

                const agora = performance.now();
                const threshold = 0.02;
                if (state.smooth > threshold) state.speakingUntil = agora + 220;
                setFalandoRemoto(userId, agora < state.speakingUntil);

                remoteRafIds[userId] = requestAnimationFrame(loop);
            };

            loop();
        }

        function pararDetectorFalaRemota(userId) {
            if (remoteRafIds[userId]) {
                cancelAnimationFrame(remoteRafIds[userId]);
                delete remoteRafIds[userId];
            }

            const state = remoteAnalysers[userId];
            if (state?.source) {
                try { state.source.disconnect(); } catch (_) {}
            }
            if (state?.analyser) {
                try { state.analyser.disconnect(); } catch (_) {}
            }

            delete remoteAnalysers[userId];
            delete remoteSpeakingState[userId];
            delete remoteNicknames[userId];
        }

        function getAudioConstraints() {
            if (isNoiseSuppressed) {
                // Perfil mais agressivo para microfones ruins.
                return {

                    noiseSuppression: { ideal: true },
                    autoGainControl: { ideal: true },
                    channelCount: { ideal: 1 },
                    sampleRate: { ideal: 48000 },
                    sampleSize: { ideal: 16 },
                    latency: { ideal: 0.01 },
                    advanced: [
                        { noiseSuppression: true },
                        { autoGainControl: true },
                        { echoCancellation: true }
                    ]
                };
            }

            // Perfil padrão: já melhorado, mantendo naturalidade.
            return {
                echoCancellation: { ideal: true },
                noiseSuppression: { ideal: true },
                autoGainControl: { ideal: true },
                channelCount: { ideal: 1 },
                sampleRate: { ideal: 48000 },

        }

            currentAudioTrack = track;

        function criarPipelineProcessamentoAudio(stream) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                const fallbackTrack = stream.getAudioTracks()[0] || null;
                return {
                    stream,
                    track: fallbackTrack,
                    context: null,
                    nodes: null
                };
            }

            const ctx = new AudioContextClass({ sampleRate: 48000 });
            const source = ctx.createMediaStreamSource(stream);

            const highpass = ctx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = isNoiseSuppressed ? 120 : 85;
            highpass.Q.value = 0.707;

            const lowShelf = ctx.createBiquadFilter();
            lowShelf.type = 'lowshelf';
            lowShelf.frequency.value = 180;
            lowShelf.gain.value = isNoiseSuppressed ? -7 : -2;

            const mudCut = ctx.createBiquadFilter();
            mudCut.type = 'peaking';
            mudCut.frequency.value = 320;
            mudCut.Q.value = 1.05;
            mudCut.gain.value = isNoiseSuppressed ? -4.5 : -1.2;

            // Realce de presença para deixar voz mais nítida.
            const presenceBoost = ctx.createBiquadFilter();
            presenceBoost.type = 'peaking';
            presenceBoost.frequency.value = 2800;
            presenceBoost.Q.value = 1.1;
            presenceBoost.gain.value = isNoiseSuppressed ? 5.2 : 2.1;

            const lowpass = ctx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = isNoiseSuppressed ? 7000 : 8200;
            lowpass.Q.value = 0.707;

            const compressor = ctx.createDynamicsCompressor();
            compressor.threshold.value = isNoiseSuppressed ? -40 : -28;
            compressor.knee.value = isNoiseSuppressed ? 14 : 20;
            compressor.ratio.value = isNoiseSuppressed ? 5.5 : 3.2;
            compressor.attack.value = 0.004;
            compressor.release.value = isNoiseSuppressed ? 0.2 : 0.14;

            const limiter = ctx.createDynamicsCompressor();
            limiter.threshold.value = -8;
            limiter.knee.value = 0;
            limiter.ratio.value = 14;
            limiter.attack.value = 0.001;
            limiter.release.value = 0.06;

            const gate = ctx.createGain();
            gate.gain.value = 1;

            const outputDestination = ctx.createMediaStreamDestination();

            source.connect(highpass);
            highpass.connect(lowShelf);
            lowShelf.connect(mudCut);
            mudCut.connect(presenceBoost);
            presenceBoost.connect(lowpass);
            lowpass.connect(compressor);
            compressor.connect(limiter);
            limiter.connect(gate);
            gate.connect(outputDestination);

            const processedTrack = outputDestination.stream.getAudioTracks()[0] || null;

            return {
                stream: outputDestination.stream,
                track: processedTrack,
                context: ctx,
                nodes: { source, highpass, lowShelf, mudCut, presenceBoost, lowpass, compressor, limiter, gate }
            };
        }

        function pararProcessamentoAudio() {
            if (processingNodes?.source) {
                try { processingNodes.source.disconnect(); } catch (_) {}
            }
            if (processingNodes?.highpass) {
                try { processingNodes.highpass.disconnect(); } catch (_) {}
            }
            if (processingNodes?.lowShelf) {
                try { processingNodes.lowShelf.disconnect(); } catch (_) {}
            }
            if (processingNodes?.mudCut) {
                try { processingNodes.mudCut.disconnect(); } catch (_) {}
            }
            if (processingNodes?.presenceBoost) {
                try { processingNodes.presenceBoost.disconnect(); } catch (_) {}
            }
            if (processingNodes?.lowpass) {
                try { processingNodes.lowpass.disconnect(); } catch (_) {}
            }
            if (processingNodes?.compressor) {
                try { processingNodes.compressor.disconnect(); } catch (_) {}
            }
            if (processingNodes?.limiter) {
                try { processingNodes.limiter.disconnect(); } catch (_) {}
            }
            if (processingNodes?.gate) {
                try { processingNodes.gate.disconnect(); } catch (_) {}
            }

            processingNodes = null;

            if (processingAudioContext && processingAudioContext.state !== 'closed') {
                processingAudioContext.close().catch(() => {});
            }

            processingAudioContext = null;
            localProcessedStream = null;
        }

        async function prepararMicrofoneInicial() {
            if (localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({
                audio: getAudioConstraints()
            });

            const pipeline = criarPipelineProcessamentoAudio(localStream);
            localProcessedStream = pipeline.stream;
            processingAudioContext = pipeline.context;
            processingNodes = pipeline.nodes;
            currentAudioTrack = pipeline.track || localStream.getAudioTracks()[0] || null;

            if (currentAudioTrack) {
                currentAudioTrack.enabled = !isMuted;
            }

            await iniciarDetectorDeFala(localStream);
        }

        async function atualizarFiltroDeRuido() {
            if (!localStream) return;

            const [track] = localStream.getAudioTracks();
            if (!track) return;

            try {
                await track.applyConstraints(getAudioConstraints());
            } catch (e) {
                // Fallback: alguns navegadores ignoram parte dos constraints no track ativo.
                const novoStream = await navigator.mediaDevices.getUserMedia({
                    audio: getAudioConstraints()
                });

                const [novaTrack] = novoStream.getAudioTracks();
                if (!novaTrack) return;

                novaTrack.enabled = !isMuted;

                Object.values(peers).forEach((peer) => {
                    const sender = peer.getSenders().find((s) => s.track && s.track.kind === 'audio');
                    if (sender) sender.replaceTrack(novaTrack);
                });

                localStream.getTracks().forEach((t) => t.stop());
                localStream = novoStream;
            }

            pararProcessamentoAudio();
            const pipeline = criarPipelineProcessamentoAudio(localStream);
            localProcessedStream = pipeline.stream;
            processingAudioContext = pipeline.context;
            processingNodes = pipeline.nodes;

            const novaTrackSaida = pipeline.track || localStream.getAudioTracks()[0] || null;
            if (novaTrackSaida) {
                novaTrackSaida.enabled = !isMuted;
                atualizarTrackNosPeers(novaTrackSaida);
            }

            await iniciarDetectorDeFala(localStream);
        }

        function avaliarQualidadeMicrofone(agora, estaFalando) {
            if (agora - ultimaAtualizacaoStatusMic < 300) return;
            ultimaAtualizacaoStatusMic = agora;

            const botaoRuido = document.getElementById('btn-ruido');
            if (!botaoRuido) return;

            if (!localStream) {
                botaoRuido.title = 'Ative quando o mic estiver com ganho alto e pegando muito som de fundo';
                return;
            }

            if (isMuted) {
                botaoRuido.title = 'Microfone está mutado';
                return;
            }

            if (isNoiseSuppressed) {
                botaoRuido.title = 'Filtro Mágico ativo: supressão forte de ruído para mic com ganho alto';
                return;
            }

            const ruidoRelativo = noiseFloorRms > 0 ? smoothedRms / noiseFloorRms : 1;
            const ruidoExcessivo = !estaFalando && ruidoRelativo > 1.8 && smoothedRms > 0.02;

            if (ruidoExcessivo) {
                botaoRuido.title = 'Muito som de fundo detectado. Recomendado ligar o Filtro Mágico';
            } else {
                botaoRuido.title = 'Mic estável. Use o Filtro Mágico só se houver reclamação de ruído';
            }
        }

        async function calibrarLimiarDeFala(analyser, data) {
            const inicio = performance.now();
            const fim = inicio + 1200;
            let somaRms = 0;
            let amostras = 0;

            while (performance.now() < fim) {
                analyser.getFloatTimeDomainData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
                somaRms += Math.sqrt(sum / data.length);
                amostras += 1;
                await new Promise((resolve) => setTimeout(resolve, 30));
            }

            const ruidoMedio = amostras > 0 ? somaRms / amostras : SPEAK_THRESHOLD;
            noiseFloorRms = ruidoMedio;
            dynamicSpeakThreshold = isNoiseSuppressed
                ? Math.max(0.022, Math.min(0.09, ruidoMedio * 3.2))
                : Math.max(0.015, Math.min(0.08, ruidoMedio * 2.6));
            smoothedRms = noiseFloorRms;
        }

        async function iniciarDetectorDeFala(stream) {
            if (micAnimationFrame) {
                cancelAnimationFrame(micAnimationFrame);
                micAnimationFrame = null;
            }

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;

            if (!iniciarDetectorDeFala.ctx || iniciarDetectorDeFala.ctx.state === 'closed') {
                iniciarDetectorDeFala.ctx = new AudioContextClass();
            }

            const ctx = iniciarDetectorDeFala.ctx;
            if (micDetectorSource) {
                try { micDetectorSource.disconnect(); } catch (_) {}
                micDetectorSource = null;
            }

            const source = ctx.createMediaStreamSource(stream);
            micDetectorSource = source;
            micAnalyser = ctx.createAnalyser();
            micAnalyser.fftSize = 1024;
            micAnalyser.smoothingTimeConstant = 0.6;
            source.connect(micAnalyser);

            const data = new Float32Array(micAnalyser.fftSize);
            await calibrarLimiarDeFala(micAnalyser, data);

            const loop = () => {
                if (!micAnalyser) return;

                micAnalyser.getFloatTimeDomainData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i] * data[i];

                const rms = Math.sqrt(sum / data.length);
                smoothedRms = smoothedRms * 0.86 + rms * 0.14;
                const agora = performance.now();

                const speechThreshold = isNoiseSuppressed
                    ? Math.max(dynamicSpeakThreshold, noiseFloorRms * 3.4)
                    : dynamicSpeakThreshold;

                if (smoothedRms > speechThreshold) speakingUntil = agora + SPEAK_HOLD_MS;
                const estaFalando = agora < speakingUntil;

                if (processingNodes?.gate?.gain) {
                    let gateTarget;
                    if (isMuted) {
                        gateTarget = 0;
                    } else if (isNoiseSuppressed) {
                        if (smoothedRms > speechThreshold * 0.9) {
                            gateTarget = 1;
                        } else if (smoothedRms > noiseFloorRms * 1.8) {
                            gateTarget = 0.45;
                        } else {
                            gateTarget = 0.07;
                        }
                    } else {
                        gateTarget = smoothedRms > speechThreshold * 0.85 ? 1 : 0.28;
                    }

                    processingNodes.gate.gain.setTargetAtTime(gateTarget, ctx.currentTime, 0.03);
                }

                atualizarAnimacaoLocalFala(estaFalando);
                avaliarQualidadeMicrofone(agora, estaFalando);
                micAnimationFrame = requestAnimationFrame(loop);
            };

            loop();
        }

        function tocarSomSintetizado(tipo) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const t = audioCtx.currentTime;

                if (tipo === 'entrar') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(250, t);
                    osc.frequency.exponentialRampToValueAtTime(650, t + 0.1);
                    osc.frequency.exponentialRampToValueAtTime(350, t + 0.2);
                    osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
                    gainNode.gain.setValueAtTime(0.1, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.35);
                    osc.start(t); osc.stop(t + 0.35);
                } else if (tipo === 'sair') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(450, t);
                    osc.frequency.linearRampToValueAtTime(150, t + 0.25);
                    gainNode.gain.setValueAtTime(0.1, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.25);
                    osc.start(t); osc.stop(t + 0.25);
                } else if (tipo === 'mutar') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(190, t);
                    gainNode.gain.setValueAtTime(0.05, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.05);
                    osc.start(t); osc.stop(t + 0.05);
                }
            } catch(e) {}
        }

        async function configurarConexaoAmigo(userId, userNickname, criarOferta) {
            const peer = criarPeer(userId, userNickname);
            const streamParaEnvio = localProcessedStream || localStream;
            streamParaEnvio.getTracks().forEach(track => peer.addTrack(track, streamParaEnvio));
            
            if (criarOferta) {
                const offer = await peer.createOffer();
                await peer.setLocalDescription(offer);
                socket.emit('signal', userId, { offer });
            }
        }

        socket.on('signal', async (fromId, data) => {
            let peer = peers[fromId];
            if (data.offer) {
                if (!peer) peer = criarPeer(fromId, "Amiguinho");
                await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peer.createAnswer();
                await peer.setLocalDescription(answer);
                socket.emit('signal', fromId, { answer });
            } else if (data.answer && peer) {
                await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate && peer) {
                await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function criarPeer(userId, userNickname) {
            if (peers[userId]) return peers[userId];

            const peer = new RTCPeerConnection({ iceServers: rtcIceServers });
            peer.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', userId, { candidate: e.candidate }); };
            
            peer.ontrack = (e) => {
                if (document.getElementById(`caixa-${userId}`)) return;
                remoteNicknames[userId] = userNickname;
                
                const amigoBox = document.createElement('div');
                amigoBox.className = 'amigo-box';
                amigoBox.id = `caixa-${userId}`;
                amigoBox.innerHTML = `<label id="label-${userId}" style="display:block; margin-bottom:4px;">🐵 Vol. ${userNickname}:</label>
                    <input type="range" min="0" max="1" step="0.1" value="1" oninput="document.getElementById('audio-${userId}').volume = this.value">`;
                
                const audio = document.createElement('audio');
                audio.id = `audio-${userId}`;
                audio.srcObject = e.streams[0];
                audio.autoplay = true;
                
                document.getElementById('lista-amigos').appendChild(amigoBox);
                document.getElementById('audios').appendChild(audio);
                iniciarDetectorFalaRemota(userId, e.streams[0]);
                
                verificarListaVazia();
            };

            peers[userId] = peer;
            return peer;
        }

        socket.on('user-disconnected', (userId) => {
            if (peers[userId]) {
                peers[userId].close();
                delete peers[userId];
                pararDetectorFalaRemota(userId);
                document.getElementById(`caixa-${userId}`)?.remove();
                document.getElementById(`audio-${userId}`)?.remove();
                tocarSomSintetizado('sair');
                verificarListaVazia();
            }
        });

        function verificarListaVazia() {
            const numAmigos = Object.keys(peers).length;
            const totalNaSala = numAmigos + 1;
            
            const arvoreVisual = document.getElementById('visual-da-arvore');
            
            arvoreVisual.innerHTML = "";

            const textoSala = getTextoStatusSala(totalNaSala);
            atualizarStatusSalaTopo(totalNaSala);

            const spanLocal = document.createElement('span');
            spanLocal.className = 'macaco-no-galho';
            spanLocal.innerText = '🐵';
            spanLocal.id = 'macaco-local';
            arvoreVisual.appendChild(spanLocal);

            Object.keys(peers).forEach((userId, index) => {
                const spanMacaco = document.createElement('span');
                spanMacaco.className = 'macaco-no-galho';
                spanMacaco.innerText = '🐵';
                spanMacaco.id = `macaco-${userId}`;
                spanMacaco.style.animationDelay = `${(index + 1) * 0.2}s`;
                if (remoteSpeakingState[userId]) spanMacaco.classList.add('falando');
                arvoreVisual.appendChild(spanMacaco);
            });

            atualizarAnimacaoLocalFala(false);
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg !== "" && salaAtual) {
                adicionarMensagemNaTela(apelidoLocal, msg, true);
                socket.emit('chat-message', salaAtual, msg);
                input.value = "";
            }
        }
        function verificarEnter(event) { if (event.key === "Enter") enviarMensagem(); }
        
        socket.on('chat-message', (id, nick, msg) => { adicionarMensagemNaTela(nick, msg, false); });

        function adicionarMensagemNaTela(nome, texto, isMinha) {
            const chatBox = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.classList.add('mensagem');
            if (isMinha) div.classList.add('minha');
            if (nome === 'Sistema') div.classList.add('mensagem-sistema');

            const strong = document.createElement('strong');
            strong.textContent = `${nome}: `;
            div.appendChild(strong);
            div.appendChild(document.createTextNode(texto));

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function mutarMicrofone() {
            if (localStream || currentAudioTrack) {
                isMuted = !isMuted;
                if (currentAudioTrack) {
                    currentAudioTrack.enabled = !isMuted;
                } else if (localStream?.getAudioTracks()[0]) {
                    localStream.getAudioTracks()[0].enabled = !isMuted;
                }

                const btn = document.getElementById('btn-mutar');
                btn.innerText = isMuted ? "🙊 Mic Fechado!" : "🐵 Mic Aberto!";
                isMuted ? btn.classList.add('btn-muted') : btn.classList.remove('btn-muted');
                tocarSomSintetizado('mutar');
                atualizarAnimacaoLocalFala(false);
                avaliarQualidadeMicrofone(performance.now(), false);
            }
        }

        // Se houver sala anterior salva e apelido carregado, tenta reconectar automaticamente.
        try {
            const salaSalva = localStorage.getItem(LAST_ROOM_STORAGE_KEY);
            if (salaSalva && apelidoLocal) {
                setTimeout(() => {
                    if (!salaAtual) entrarNaSala(salaSalva);
                }, 250);
            }
        } catch (_) {}

        function alternarRuido() {
            if (localStream) {
                isNoiseSuppressed = !isNoiseSuppressed;
                atualizarFiltroDeRuido().catch(() => {});
                const btn = document.getElementById('btn-ruido');
                btn.innerText = isNoiseSuppressed ? "🎧 Filtro Mágico: LIGADO" : "🎧 Filtro Mágico: DESLIGADO";
                btn.style.backgroundColor = isNoiseSuppressed ? "#FDA7DF" : "#F19066";
                btn.style.borderColor = isNoiseSuppressed ? "#D980FA" : "#C44569";
                btn.style.boxShadow = isNoiseSuppressed ? "0 3px 0 #D980FA" : "0 3px 0 #C44569";
                avaliarQualidadeMicrofone(performance.now(), false);
            }
        }
    </script>
</body>
</html>
