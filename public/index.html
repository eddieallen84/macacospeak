<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacacoSpeak 🍌</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body class="fundo-banana">

    <div class="sidebar">
        <h2>🐵 MacacoSpeak</h2>

        <div class="variavel-container">
            <label>Suba seu Nome:</label>
            <div class="input-group">
                <input type="text" id="txt-variavel" placeholder="Macaquinho..." autocomplete="off">
                <button id="btn-ok-variavel" onclick="salvarVariavel()" title="Salvar nome">✔️</button>
            </div>
        </div>

        <div class="salas">
            <button id="btn-arvore1" onclick="entrarNaSala('arvore-1')">🌴 Subir na Árvore 1!</button>
            <button id="btn-arvore2" onclick="entrarNaSala('arvore-2')">🌴 Subir na Árvore 2!</button>
        </div>

        <div id="controles-sala" style="display: none;">
            <button id="btn-mutar" class="btn-mute" onclick="mutarMicrofone()">🐵 Mic Aberto!</button>
            <button id="btn-ruido" class="btn-ruido" onclick="alternarRuido()"
                title="Ative quando o mic estiver com ganho alto e pegando muito som de fundo"><span class="luz-status"
                    id="luz-ruido"></span><span id="texto-btn-ruido">🎧 Filtro Mágico: DESLIGADO</span></button>
            <div class="medidor-ruido-wrap">
                <div class="medidor-ruido-legenda"><span>🎤 Seu microfone agora</span></div>
                <div class="medidor-ruido">
                    <div id="medidor-ruido-fill" class="medidor-ruido-fill"></div>
                </div>
                <div class="medidor-ruido-status" id="medidor-ruido-status" style="visibility: hidden;"></div>
            </div>

            <button id="btn-config-audio" class="btn-config-audio" onclick="alternarPainelAudio()">⚙️ Configurações de
                Áudio</button>
            <div id="painel-audio" class="painel-audio" style="display: none;">
                <label class="painel-audio-label" for="slider-ganho">🎚️ Ganho de entrada: <span
                        id="valor-ganho">1.0x</span></label>
                <input type="range" id="slider-ganho" min="1" max="3" step="0.1" value="1"
                    oninput="ajustarGanhoEntrada(this.value)">
                <p class="painel-audio-dica">Aumente se o medidor ficar sempre baixo mesmo falando perto do mic.</p>

                <label class="painel-audio-label" for="slider-forca-gate">🔇 Força do corte de ruído (Filtro
                    Mágico)</label>
                <input type="range" id="slider-forca-gate" min="1" max="3" step="1" value="2"
                    oninput="ajustarForcaGate(this.value)">
                <div class="painel-audio-legenda-slider"><span>Suave</span><span>Médio</span><span>Forte</span></div>
                <p class="painel-audio-dica">Só afeta os intervalos SEM fala. Sua voz nunca é abafada.</p>

                <label class="painel-audio-label" for="select-microfone">🎙️ Microfone</label>
                <select id="select-microfone" onchange="trocarMicrofone(this.value)">
                    <option value="">Padrão do sistema</option>
                </select>
            </div>

            <div style="margin-top: 15px;">
                <div id="visual-da-arvore"></div>
                <div id="lista-amigos"></div>
            </div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-topbar">
            <div class="chat-topbar-esquerda">
                <span id="status-conexao" class="badge-status connecting">Conectando...</span>
                <span id="status-sala-topo" class="badge-status">Sozinho na sala 🎈</span>
            </div>
            <div class="seletor-cenario">
                <label>Escolha o Cenário:</label>
                <select id="select-fundo" onchange="alterarFundo(this.value)">
                    <option value="banana">🍌 Chuva de Banana</option>
                    <option value="autista">🧩 Macaco Autista Dino & ET</option>
                    <option value="cannabis">🌿 Macaco Maconheiro</option>
                    <option value="gay">💋 Macaco Gay Fabuloso</option>
                    <option value="noite">⭐ Hora de Dormir</option>
                    <option value="nuvem">☁️ Macaco na Nuvem Feliz</option>
                </select>
            </div>
        </div>
        <div id="overlay-bloqueio">
            hola macaquito, escolha seu nome e aperte ok 🍌
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Escreva algo legal..." onkeypress="verificarEnter(event)">
            <button id="btn-enviar" onclick="enviarMensagem()">Enviar!</button>
        </div>
    </div>

    <div id="toast-feedback" class="toast-feedback"></div>

    <div id="audios"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const peers = {};
        let rtcIceServers = [{ urls: 'stun:stun.l.google.com:19302' }];
        let localStream;
        let isMuted = false;
        let isNoiseSuppressed = false;
        let salaAtual = null;
        let variavelLocal = "";
        let micAnimationFrame = null;
        let speakingUntil = 0;
        let noiseFloorRms = 0.01;
        let smoothedRms = 0;
        let dynamicSpeakThreshold = 0.028;
        let ultimaAtualizacaoMic = 0;
        let localProcessedStream = null;
        let processingAudioContext = null;
        let processingNodes = null;
        let currentAudioTrack = null;
        let currentGateGain = 1;
        let nivelPicoRecente = 0.04;
        let dispositivoMicSelecionado = null;
        let ganhoEntradaAtual = 1;
        let forcaCorteRuido = 0.05;
        const speakThreshold = 0.028;
        const speakHoldMs = 220;
        let roomCounts = { 'arvore-1': 0, 'arvore-2': 0 };
        const variavelStorageKey = 'macacospeak.variavel';
        const themeStorageKey = 'macacospeak.tema';
        const lastRoomStorageKey = 'macacospeak.lastRoom';
        let toastTimer = null;
        let remoteAudioContext = null;
        const remoteSpeakingState = {};
        const remoteAnalysers = {};
        const remoteRafIds = {};
        const remoteVariables = {};

        function mostrarToast(texto) {
            const toast = document.getElementById('toast-feedback');
            if (!toast) return;

            toast.textContent = texto;
            toast.classList.add('mostrar');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('mostrar');
            }, 2200);
        }

        function atualizarEstadoVariavel(bloqueado) {
            const input = document.getElementById('txt-variavel');
            const btnOk = document.getElementById('btn-ok-variavel');
            if (!input || !btnOk) return;

            input.disabled = bloqueado;
            btnOk.innerText = bloqueado ? '✏️' : '✔️';
            btnOk.title = bloqueado ? 'Editar nome' : 'Salvar nome';
            btnOk.style.backgroundColor = bloqueado ? '#F8C291' : '#78E08F';
            btnOk.style.borderColor = bloqueado ? '#E58E26' : '#2E7D32';
            btnOk.style.boxShadow = bloqueado ? '0 3px 0 #E58E26' : '0 3px 0 #2E7D32';
        }

        function ajustarEspacamentoChatPorTopbar() {
            const topbar = document.querySelector('.chat-topbar');
            const chatMessages = document.getElementById('chat-messages');
            if (!topbar || !chatMessages) return;

            const altura = topbar.offsetHeight || 54;
            const paddingTop = Math.max(16, Math.round(16 + (altura - 54) * 0.65));
            chatMessages.style.paddingTop = `${paddingTop}px`;
        }

        function atualizarTituloAmigo(userId) {
            const label = document.getElementById(`label-${userId}`);
            const caixa = document.getElementById(`caixa-${userId}`);
            if (!label) return;
            
            const nick = remoteVariables[userId] || 'Amiguinho';
            const falando = !!remoteSpeakingState[userId];
            
            // Texto sem o "Vol."
            label.textContent = falando ? `🔊 ${nick}:` : `🐵 ${nick}:`;

            // Aplica cor dinâmica baseada no nome
            if (caixa) {
                let hash = 0;
                for (let i = 0; i < nick.length; i++) {
                    hash = (hash * 31 + nick.charCodeAt(i)) & 0xffffffff;
                }
                const matiz = Math.abs(hash) % 360;
                
                caixa.style.backgroundColor = `hsl(${matiz}, 65%, 85%)`;
                caixa.style.borderColor = `hsl(${matiz}, 50%, 50%)`;
                label.style.color = `hsl(${matiz}, 80%, 25%)`;
            }
        }

        function setFalandoRemoto(userId, falando, intensidade) {
            const valor = !!falando;
            const macaco = document.getElementById(`macaco-${userId}`);
            if (macaco && typeof intensidade === 'number') {
                macaco.style.setProperty('--intensidade', intensidade.toFixed(2));
            }
            if (remoteSpeakingState[userId] === valor) return;
            remoteSpeakingState[userId] = valor;
            const caixa = document.getElementById(`caixa-${userId}`);
            if (caixa) caixa.classList.toggle('falando-remoto', valor);
            if (macaco) macaco.classList.toggle('falando', valor);
            atualizarTituloAmigo(userId);
        }

        function iniciarDetectorFalaRemota(userId, stream) {
            if (remoteRafIds[userId]) {
                cancelAnimationFrame(remoteRafIds[userId]);
                delete remoteRafIds[userId];
            }

            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;

            if (!remoteAudioContext || remoteAudioContext.state === 'closed') {
                remoteAudioContext = new AudioContextClass();
            }

            let source;
            try {
                source = remoteAudioContext.createMediaStreamSource(stream);
            } catch (err) {
                return;
            }

            const analyser = remoteAudioContext.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.7;
            source.connect(analyser);

            remoteAnalysers[userId] = {
                source,
                analyser,
                data: new Float32Array(analyser.fftSize),
                speakingUntil: 0,
                smooth: 0
            };

            const loop = () => {
                const state = remoteAnalysers[userId];
                if (!state) return;

                state.analyser.getFloatTimeDomainData(state.data);
                let sum = 0;
                for (let i = 0; i < state.data.length; i++) sum += state.data[i] * state.data[i];
                const rms = Math.sqrt(sum / state.data.length);
                state.smooth = state.smooth * 0.84 + rms * 0.16;

                const agora = performance.now();
                const threshold = 0.02;
                if (state.smooth > threshold) state.speakingUntil = agora + 220;
                const nivelNormalizadoRemoto = Math.min(1, state.smooth / (threshold * 3.2));
                setFalandoRemoto(userId, agora < state.speakingUntil, 0.4 + nivelNormalizadoRemoto * 1.8);

                remoteRafIds[userId] = requestAnimationFrame(loop);
            };

            loop();
        }

        function pararDetectorFalaRemota(userId) {
            if (remoteRafIds[userId]) {
                cancelAnimationFrame(remoteRafIds[userId]);
                delete remoteRafIds[userId];
            }

            const state = remoteAnalysers[userId];
            if (state?.source) {
                try { state.source.disconnect(); } catch (err) { }
            }
            if (state?.analyser) {
                try { state.analyser.disconnect(); } catch (err) { }
            }

            delete remoteAnalysers[userId];
            delete remoteSpeakingState[userId];
            delete remoteVariables[userId];
        }

        function getTextoStatusSala(totalNaSala) {
            if (totalNaSala === 1) return 'Sozinho na sala 🎈';
            if (totalNaSala === 2) return 'Macaques 🐒🐒';
            if (totalNaSala === 3) return 'Macaco junto forte 🦍🦍🦍';
            return 'Macacada reunida! 🎉🍌';
        }

        function carregarVariavelSalva() {
            const input = document.getElementById('txt-variavel');
            if (!input) return;

            try {
                const salvo = localStorage.getItem(variavelStorageKey);
                if (salvo && salvo.trim()) {
                    variavelLocal = salvo.trim();
                    input.value = variavelLocal;
                    atualizarEstadoVariavel(true);
                    return;
                }
            } catch (err) { }

            atualizarEstadoVariavel(false);
        }

        function atualizarBotoesSalas() {
            const btnArvore1 = document.getElementById('btn-arvore1');
            const btnArvore2 = document.getElementById('btn-arvore2');
            if (!btnArvore1 || !btnArvore2) return;

            btnArvore1.innerText = `🌴 Subir na Árvore 1! (${roomCounts['arvore-1'] || 0})`;
            btnArvore2.innerText = `🌴 Subir na Árvore 2! (${roomCounts['arvore-2'] || 0})`;
        }

        function atualizarStatusConexao(texto, tipo) {
            const el = document.getElementById('status-conexao');
            if (!el) return;
            el.textContent = texto;
            el.classList.remove('online', 'offline', 'connecting');
            el.classList.add(tipo);
        }

        function atualizarStatusSalaTopo(totalNaSala) {
            const el = document.getElementById('status-sala-topo');
            if (!el) return;
            el.textContent = getTextoStatusSala(totalNaSala || 1);
        }

        function carregarTemaSalvo() {
            const select = document.getElementById('select-fundo');
            if (!select) return;
            try {
                const tema = localStorage.getItem(themeStorageKey);
                if (tema) {
                    select.value = tema;
                    alterarFundo(tema);
                }
            } catch (err) { }
        }

        socket.on('ice-config', (iceServers) => {
            if (Array.isArray(iceServers) && iceServers.length > 0) {
                rtcIceServers = iceServers;
            }
        });

        socket.on('room-counts', (counts) => {
            roomCounts = {
                'arvore-1': counts?.['arvore-1'] || 0,
                'arvore-2': counts?.['arvore-2'] || 0
            };
            atualizarBotoesSalas();
        });

        let socketJaConectouAntes = false;

        socket.on('connect', () => {
            atualizarStatusConexao('Conectado', 'online');

            if (socketJaConectouAntes && salaAtual) {
                const salaParaVoltar = salaAtual;
                salaAtual = null;
                mostrarToast('🔌 A conexão caiu e voltou! Te colocando de volta na árvore...');
                entrarNaSala(salaParaVoltar, { reconectando: true });
            }

            socketJaConectouAntes = true;
        });

        socket.on('disconnect', () => {
            atualizarStatusConexao('Desconectado', 'offline');
        });

        socket.on('connect_error', () => {
            atualizarStatusConexao('Reconectando...', 'connecting');
        });

        carregarVariavelSalva();
        carregarTemaSalvo();
        atualizarVisualBotaoRuido();
        ajustarEspacamentoChatPorTopbar();
        window.addEventListener('resize', ajustarEspacamentoChatPorTopbar);

        function getAudioConstraints() {
            const constraints = {
                echoCancellation: { ideal: true },
                noiseSuppression: { ideal: false },
                autoGainControl: { ideal: false },
                channelCount: { ideal: 1 },
                sampleRate: { ideal: 48000 },
                sampleSize: { ideal: 16 },
                latency: { ideal: 0.015 }
            };

            if (dispositivoMicSelecionado) {
                constraints.deviceId = { exact: dispositivoMicSelecionado };
            }

            return constraints;
        }

        function atualizarTrackNosPeers(track) {
            currentAudioTrack = track;
            Object.values(peers).forEach((peer) => {
                const sender = peer.getSenders().find((s) => s.track && s.track.kind === 'audio');
                if (sender) sender.replaceTrack(track);
            });
        }

        function criarPipelineProcessamentoAudio(stream) {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
                const fallbackTrack = stream.getAudioTracks()[0] || null;
                return {
                    stream,
                    track: fallbackTrack,
                    context: null,
                    nodes: null
                };
            }

            const ctx = new AudioContextClass({ sampleRate: 48000 });
            const source = ctx.createMediaStreamSource(stream);

            const inputGain = ctx.createGain();
            inputGain.gain.value = ganhoEntradaAtual;

            const analyser = ctx.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.6;

            const highpass = ctx.createBiquadFilter();
            highpass.type = 'highpass';
            highpass.frequency.value = 90;
            highpass.Q.value = 0.707;

            const lowShelf = ctx.createBiquadFilter();
            lowShelf.type = 'lowshelf';
            lowShelf.frequency.value = 180;
            lowShelf.gain.value = -2.5;

            const mudCut = ctx.createBiquadFilter();
            mudCut.type = 'peaking';
            mudCut.frequency.value = 320;
            mudCut.Q.value = 1.05;
            mudCut.gain.value = -1.5;

            const presenceBoost = ctx.createBiquadFilter();
            presenceBoost.type = 'peaking';
            presenceBoost.frequency.value = 2800;
            presenceBoost.Q.value = 1.1;
            presenceBoost.gain.value = 2.4;

            const lowpass = ctx.createBiquadFilter();
            lowpass.type = 'lowpass';
            lowpass.frequency.value = 8500;
            lowpass.Q.value = 0.707;

            const compressor = ctx.createDynamicsCompressor();
            compressor.threshold.value = -22;
            compressor.knee.value = 20;
            compressor.ratio.value = 3;
            compressor.attack.value = 0.005;
            compressor.release.value = 0.15;

            const limiter = ctx.createDynamicsCompressor();
            limiter.threshold.value = -8;
            limiter.knee.value = 0;
            limiter.ratio.value = 14;
            limiter.attack.value = 0.001;
            limiter.release.value = 0.06;

            const gate = ctx.createGain();
            gate.gain.value = 1;

            const outputDestination = ctx.createMediaStreamDestination();

            source.connect(inputGain);
            inputGain.connect(analyser);
            inputGain.connect(highpass);
            highpass.connect(lowShelf);
            lowShelf.connect(mudCut);
            mudCut.connect(presenceBoost);
            presenceBoost.connect(lowpass);
            lowpass.connect(compressor);
            compressor.connect(limiter);
            limiter.connect(gate);
            gate.connect(outputDestination);

            const processedTrack = outputDestination.stream.getAudioTracks()[0] || null;

            return {
                stream: outputDestination.stream,
                track: processedTrack,
                context: ctx,
                nodes: { source, inputGain, analyser, highpass, lowShelf, mudCut, presenceBoost, lowpass, compressor, limiter, gate }
            };
        }

        function pararProcessamentoAudio() {
            if (processingNodes?.source) {
                try { processingNodes.source.disconnect(); } catch (err) { }
            }
            if (processingNodes?.inputGain) {
                try { processingNodes.inputGain.disconnect(); } catch (err) { }
            }
            if (processingNodes?.analyser) {
                try { processingNodes.analyser.disconnect(); } catch (err) { }
            }
            if (processingNodes?.highpass) {
                try { processingNodes.highpass.disconnect(); } catch (err) { }
            }
            if (processingNodes?.lowShelf) {
                try { processingNodes.lowShelf.disconnect(); } catch (err) { }
            }
            if (processingNodes?.mudCut) {
                try { processingNodes.mudCut.disconnect(); } catch (err) { }
            }
            if (processingNodes?.presenceBoost) {
                try { processingNodes.presenceBoost.disconnect(); } catch (err) { }
            }
            if (processingNodes?.lowpass) {
                try { processingNodes.lowpass.disconnect(); } catch (err) { }
            }
            if (processingNodes?.compressor) {
                try { processingNodes.compressor.disconnect(); } catch (err) { }
            }
            if (processingNodes?.limiter) {
                try { processingNodes.limiter.disconnect(); } catch (err) { }
            }
            if (processingNodes?.gate) {
                try { processingNodes.gate.disconnect(); } catch (err) { }
            }

            processingNodes = null;

            if (processingAudioContext && processingAudioContext.state !== 'closed') {
                processingAudioContext.close().catch(() => { });
            }

            processingAudioContext = null;
            localProcessedStream = null;
        }

        async function reiniciarCapturaMicrofone() {
            const streamAntigo = localStream;
            const novoStream = await navigator.mediaDevices.getUserMedia({
                audio: getAudioConstraints()
            });

            pararProcessamentoAudio();
            const pipeline = criarPipelineProcessamentoAudio(novoStream);
            localProcessedStream = pipeline.stream;
            processingAudioContext = pipeline.context;
            processingNodes = pipeline.nodes;

            const novaTrackSaida = pipeline.track || novoStream.getAudioTracks()[0] || null;
            if (novaTrackSaida) {
                novaTrackSaida.enabled = !isMuted;
                atualizarTrackNosPeers(novaTrackSaida);
            }

            localStream = novoStream;
            if (streamAntigo) {
                streamAntigo.getTracks().forEach((t) => t.stop());
            }

            await iniciarDetectorDeFala();
        }

        async function prepararMicrofoneInicial() {
            if (localStream) return;
            await reiniciarCapturaMicrofone();
        }

        let ruidoAltoDesdeMs = 0;

        function atualizarMedidorRuido(nivelNormalizado, gateTarget, estaFalando) {
            const fill = document.getElementById('medidor-ruido-fill');
            const status = document.getElementById('medidor-ruido-status');
            if (!fill || !status) return;

            const nivelExibido = Math.max(0.03, nivelNormalizado * Math.max(gateTarget, 0.25));
            fill.style.width = `${Math.round(nivelExibido * 100)}%`;
            fill.classList.toggle('voz-passando', gateTarget > 0.5);

            const agora = performance.now();
            const ruidoRelativo = noiseFloorRms > 0 ? smoothedRms / noiseFloorRms : 1;
            const pareceRuidoDeFundo = !isMuted && !isNoiseSuppressed && !estaFalando && ruidoRelativo > 1.9 && smoothedRms > 0.02;

            if (pareceRuidoDeFundo) {
                if (!ruidoAltoDesdeMs) ruidoAltoDesdeMs = agora;
            } else {
                ruidoAltoDesdeMs = 0;
            }

            const ruidoPersistente = ruidoAltoDesdeMs && (agora - ruidoAltoDesdeMs > 2500);
            status.textContent = ruidoPersistente
                ? '💡 Muito som de fundo! Que tal ligar o Filtro Mágico? 🎧'
                : '';
            status.style.visibility = ruidoPersistente ? 'visible' : 'hidden';
        }

        function atualizarVisualBotaoRuido() {
            const btn = document.getElementById('btn-ruido');
            const texto = document.getElementById('texto-btn-ruido');
            if (!btn || !texto) return;

            texto.textContent = isNoiseSuppressed ? '🎧 Filtro Mágico: LIGADO' : '🎧 Filtro Mágico: DESLIGADO';
            btn.classList.toggle('ligado', isNoiseSuppressed);
            btn.style.backgroundColor = isNoiseSuppressed ? '#FDA7DF' : '#F19066';
            btn.style.borderColor = isNoiseSuppressed ? '#D980FA' : '#C44569';
            btn.style.boxShadow = isNoiseSuppressed ? '0 3px 0 #D980FA' : '0 3px 0 #C44569';
        }

        function alternarPainelAudio() {
            const painel = document.getElementById('painel-audio');
            if (!painel) return;
            const vaiAbrir = painel.style.display === 'none';
            painel.style.display = vaiAbrir ? 'block' : 'none';
            if (vaiAbrir) listarMicrofones();
        }

        function ajustarGanhoEntrada(valor) {
            ganhoEntradaAtual = parseFloat(valor) || 1;
            const label = document.getElementById('valor-ganho');
            if (label) label.textContent = `${ganhoEntradaAtual.toFixed(1)}x`;
            if (processingNodes?.inputGain && processingAudioContext) {
                processingNodes.inputGain.gain.setTargetAtTime(ganhoEntradaAtual, processingAudioContext.currentTime, 0.05);
            }
        }

        function ajustarForcaGate(nivel) {
            const niveis = { 1: 0.14, 2: 0.05, 3: 0.015 };
            forcaCorteRuido = niveis[nivel] ?? 0.05;
        }

        async function listarMicrofones() {
            const select = document.getElementById('select-microfone');
            if (!select || !navigator.mediaDevices?.enumerateDevices) return;

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const todasEntradas = devices.filter((d) => d.kind === 'audioinput');

                const vistos = new Map();
                todasEntradas.forEach((d) => {
                    if (d.deviceId === 'default' || d.deviceId === 'communications') return;

                    const label = d.label || '';
                    const idHardware = label.match(/\(([0-9a-f]{4}:[0-9a-f]{4})\)\s*$/i);
                    const chave = idHardware ? idHardware[1].toLowerCase() : (d.groupId || d.deviceId);
                    const ehGenerico = /^(Padrão|Comunicações)\s*-/i.test(label);

                    const existente = vistos.get(chave);
                    if (!existente || (existente.generico && !ehGenerico)) {
                        vistos.set(chave, { device: d, generico: ehGenerico });
                    }
                });
                const entradas = Array.from(vistos.values()).map((v) => v.device);

                const valorAtual = select.value;

                select.innerHTML = '<option value="">Padrão do sistema</option>';
                entradas.forEach((d, i) => {
                    const opt = document.createElement('option');
                    opt.value = d.deviceId;
                    opt.textContent = (d.label || `Microfone ${i + 1}`).replace(/^(Padrão|Comunicações)\s*-\s*/i, '');
                    select.appendChild(opt);
                });

                select.value = valorAtual || dispositivoMicSelecionado || '';
            } catch (err) { }
        }

        async function trocarMicrofone(deviceId) {
            dispositivoMicSelecionado = deviceId || null;
            try {
                await reiniciarCapturaMicrofone();
                mostrarToast('🎙️ Microfone trocado!');
            } catch (e) {
                mostrarToast('😬 Não consegui usar esse microfone.');
            }
        }

        function atualizarAnimacaoLocalFala(estaFalando, intensidade) {
            const macacoLocal = document.getElementById('macaco-local');
            if (!macacoLocal) return;
            macacoLocal.classList.toggle('falando', estaFalando && !isMuted);
            if (typeof intensidade === 'number') {
                macacoLocal.style.setProperty('--intensidade', intensidade.toFixed(2));
            }
        }

        function avaliarQualidadeMicrofone(agora, estaFalando) {
            if (agora - ultimaAtualizacaoMic < 300) return;
            ultimaAtualizacaoMic = agora;

            const botaoRuido = document.getElementById('btn-ruido');
            if (!botaoRuido) return;

            if (!localStream) {
                botaoRuido.title = 'Ative quando o mic estiver com ganho alto e pegando muito som de fundo';
                return;
            }

            if (isMuted) {
                botaoRuido.title = 'Microfone está mutado';
                return;
            }

            if (isNoiseSuppressed) {
                botaoRuido.title = 'Filtro Mágico ativo: supressão forte de ruído para mic com ganho alto';
                return;
            }

            const ruidoRelativo = noiseFloorRms > 0 ? smoothedRms / noiseFloorRms : 1;
            const ruidoExcessivo = !estaFalando && ruidoRelativo > 1.8 && smoothedRms > 0.02;

            if (ruidoExcessivo) {
                botaoRuido.title = 'Muito som de fundo detectado. Recomendado ligar o Filtro Mágico';
            } else {
                botaoRuido.title = 'Mic estável. Use o Filtro Mágico só se houver reclamação de ruído';
            }
        }

        async function calibrarLimiarDeFala(analyser, data) {
            const inicio = performance.now();
            const fim = inicio + 1200;
            let somaRms = 0;
            let amostras = 0;

            while (performance.now() < fim) {
                analyser.getFloatTimeDomainData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
                somaRms += Math.sqrt(sum / data.length);
                amostras += 1;
                await new Promise((resolve) => setTimeout(resolve, 30));
            }

            const ruidoMedio = amostras > 0 ? somaRms / amostras : speakThreshold;
            noiseFloorRms = ruidoMedio;
            dynamicSpeakThreshold = Math.max(0.015, Math.min(0.08, ruidoMedio * 2.6));
            smoothedRms = noiseFloorRms;
            nivelPicoRecente = Math.max(0.04, dynamicSpeakThreshold * 2);
        }

        async function iniciarDetectorDeFala() {
            if (micAnimationFrame) {
                cancelAnimationFrame(micAnimationFrame);
                micAnimationFrame = null;
            }

            const analyser = processingNodes?.analyser;
            const ctx = processingAudioContext;
            if (!analyser || !ctx) return;

            const data = new Float32Array(analyser.fftSize);
            await calibrarLimiarDeFala(analyser, data);

            const loop = () => {
                if (!processingNodes || processingNodes.analyser !== analyser) return;

                analyser.getFloatTimeDomainData(data);
                let sum = 0;
                for (let i = 0; i < data.length; i++) sum += data[i] * data[i];

                const rms = Math.sqrt(sum / data.length);
                smoothedRms = smoothedRms * 0.86 + rms * 0.14;
                const agora = performance.now();

                const speechThreshold = dynamicSpeakThreshold;
                if (smoothedRms > speechThreshold) speakingUntil = agora + speakHoldMs;
                const estaFalando = agora < speakingUntil;

                nivelPicoRecente = Math.max(smoothedRms, nivelPicoRecente * 0.992);
                const nivelReferencia = Math.max(0.015, nivelPicoRecente);
                const nivelNormalizado = Math.min(1, smoothedRms / nivelReferencia);
                const intensidadePulo = 0.5 + nivelNormalizado * 2.3;

                let gateTarget = 1;
                if (processingNodes?.gate?.gain) {
                    if (isMuted) {
                        gateTarget = 0;
                    } else if (smoothedRms > speechThreshold * 0.85) {
                        gateTarget = 1;
                    } else if (isNoiseSuppressed) {
                        gateTarget = smoothedRms > noiseFloorRms * 1.8
                            ? Math.min(0.3, forcaCorteRuido * 3)
                            : forcaCorteRuido;
                    } else {
                        gateTarget = 0.85;
                    }

                    processingNodes.gate.gain.setTargetAtTime(gateTarget, ctx.currentTime, 0.03);
                }
                currentGateGain = gateTarget;

                atualizarAnimacaoLocalFala(estaFalando, intensidadePulo);
                avaliarQualidadeMicrofone(agora, estaFalando);
                atualizarMedidorRuido(nivelNormalizado, gateTarget, estaFalando);
                micAnimationFrame = requestAnimationFrame(loop);
            };

            loop();
        }

        function alterarFundo(tipo) {
            document.body.className = 'fundo-' + tipo;
            try {
                localStorage.setItem(themeStorageKey, tipo);
            } catch (err) { }
        }

        function salvarVariavel() {
            const input = document.getElementById('txt-variavel');
            if (!input) return;

            if (input.disabled) {
                atualizarEstadoVariavel(false);
                input.focus();
                input.select();
                return;
            }

            if (input.value.trim() === "") {
                alert("Opa! Esqueceu de colocar o nome!");
                return;
            }

            const variavelAnterior = variavelLocal;
            const novoVariavel = input.value.trim();

            const aplicarNomeLocalmente = () => {
                variavelLocal = novoVariavel;
                input.value = variavelLocal;

                try {
                    localStorage.setItem(variavelStorageKey, variavelLocal);
                } catch (err) { }

                atualizarEstadoVariavel(true);
                mostrarToast(`Nome salvo: ${variavelLocal}`);

                const overlay = document.getElementById('overlay-bloqueio');
                if (overlay && !salaAtual) {
                    overlay.innerHTML = `muito bem "${variavelLocal}", agora escoha sua arvore e seja um macaco feliz 🍌`;
                }
            };

            if (salaAtual && variavelAnterior && variavelAnterior !== novoVariavel) {
                socket.emit('update-nickname', novoVariavel, (resposta) => {
                    if (!resposta || !resposta.ok) {
                        alert('Esse nome já está sendo usado por outro macaco nessa árvore! Escolha outro.');
                        return;
                    }

                    aplicarNomeLocalmente();

                    const caixaLocal = document.getElementById(`caixa-${socket.id}`);
                    if (caixaLocal) {
                        caixaLocal.innerHTML = '';

                        const label = document.createElement('label');
                        label.style.display = 'block';
                        label.style.marginBottom = '4px';
                        label.textContent = `🐵 ${variavelLocal}:`;

                        const slider = document.createElement('input');
                        slider.type = 'range';
                        slider.min = '0';
                        slider.max = '1';
                        slider.step = '0.1';
                        slider.value = '1';
                        slider.setAttribute('aria-label', `Volume de ${variavelLocal}`);
                        slider.addEventListener('input', () => {
                            const audioEl = document.getElementById(`audio-${socket.id}`);
                            if (audioEl) audioEl.volume = slider.value;
                        });

                        caixaLocal.appendChild(label);
                        caixaLocal.appendChild(slider);
                        
                        let hash = 0;
                        for (let i = 0; i < variavelLocal.length; i++) {
                            hash = (hash * 31 + variavelLocal.charCodeAt(i)) & 0xffffffff;
                        }
                        const matiz = Math.abs(hash) % 360;
                        caixaLocal.style.backgroundColor = `hsl(${matiz}, 65%, 85%)`;
                        caixaLocal.style.borderColor = `hsl(${matiz}, 50%, 50%)`;
                        label.style.color = `hsl(${matiz}, 80%, 25%)`;
                    }
                    adicionarMensagemNaTela('Sistema', `Seu nome mudou para ${variavelLocal}.`, true);
                });
            } else {
                aplicarNomeLocalmente();
            }
        }

        function tocarSomSintetizado(tipo) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                const t = audioCtx.currentTime;

                if (tipo === 'entrar') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(250, t);
                    osc.frequency.exponentialRampToValueAtTime(650, t + 0.1);
                    osc.frequency.exponentialRampToValueAtTime(350, t + 0.2);
                    osc.frequency.exponentialRampToValueAtTime(800, t + 0.3);
                    gainNode.gain.setValueAtTime(0.1, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.35);
                    osc.start(t); osc.stop(t + 0.35);
                } else if (tipo === 'sair') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(450, t);
                    osc.frequency.linearRampToValueAtTime(150, t + 0.25);
                    gainNode.gain.setValueAtTime(0.1, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.25);
                    osc.start(t); osc.stop(t + 0.25);
                } else if (tipo === 'mutar') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(190, t);
                    gainNode.gain.setValueAtTime(0.05, t);
                    gainNode.gain.linearRampToValueAtTime(0, t + 0.05);
                    osc.start(t); osc.stop(t + 0.05);
                }
            } catch (e) { }
        }

        async function entrarNaSala(nomeSala, opcoes) {
            const reconectando = !!opcoes?.reconectando;

            if (!variavelLocal) {
                alert("Escreva seu nome e clique em OK primeiro!");
                return;
            }

            try {
                await prepararMicrofoneInicial();

                const salaAnterior = salaAtual;

                socket.emit('join-room', nomeSala, variavelLocal, (resposta) => {
                    if (!resposta || !resposta.ok) {
                        if (resposta && resposta.reason === 'nick-em-uso') {
                            alert('Esse nome já está sendo usado por outro macaco nessa árvore! Escolha outro nome.');
                        } else {
                            alert('Não foi possível entrar nessa árvore. Tente de novo.');
                        }
                        return;
                    }

                    if (salaAnterior && salaAnterior !== nomeSala) {
                        socket.emit('leave-room', salaAnterior);
                    }

                    salaAtual = nomeSala;
                    try { localStorage.setItem(lastRoomStorageKey, nomeSala); } catch (err) { }

                    document.getElementById('lista-amigos').innerHTML = '';
                    document.getElementById('audios').innerHTML = '';
                    if (!reconectando) document.getElementById('chat-messages').innerHTML = '';
                    for (let id in peers) {
                        peers[id].close();
                        delete peers[id];
                        pararDetectorFalaRemota(id);
                    }

                    document.getElementById('btn-arvore1').classList.remove('btn-ativo');
                    document.getElementById('btn-arvore2').classList.remove('btn-ativo');
                    document.getElementById(nomeSala === 'arvore-1' ? 'btn-arvore1' : 'btn-arvore2').classList.add('btn-ativo');

                    document.getElementById('controles-sala').style.display = 'block';
                    document.getElementById('overlay-bloqueio').style.display = 'none';

                    if (!reconectando) {
                        tocarSomSintetizado('entrar');
                        mostrarToast(`Entrou na ${nomeSala.replace('-', ' ')}`);
                    } else {
                        mostrarToast('🐵 De volta na árvore!');
                        adicionarMensagemNaTela('Sistema', 'Reconectado! (a conexão caiu por um instante)', true);
                    }
                    verificarListaVazia();
                });
            } catch (error) {
                alert("Erro! O navegador bloqueou seu microfone.");
            }
        }

        socket.on('user-nickname-updated', (userId, novoNome) => {
            remoteVariables[userId] = novoNome;
            atualizarTituloAmigo(userId);
            adicionarMensagemNaTela('Sistema', `${novoNome} mudou de nome.`, false);
        });

        socket.on('current-room-users', (usuarios) => {
            for (const id in usuarios) {
                remoteVariables[id] = usuarios[id];
                configurarConexaoAmigo(id, usuarios[id], false);
                atualizarTituloAmigo(id);
            }
        });

        socket.on('user-connected', async (userId, userVariavel) => {
            remoteVariables[userId] = userVariavel;
            tocarSomSintetizado('entrar');
            configurarConexaoAmigo(userId, userVariavel, true);
            atualizarTituloAmigo(userId);
        });

        async function configurarConexaoAmigo(userId, userVariavel, criarOferta) {
            const peer = criarPeer(userId, userVariavel);
            const jaTemAudioSaindo = peer.getSenders().some((s) => s.track && s.track.kind === 'audio');

            if (!jaTemAudioSaindo) {
                const streamParaEnvio = localProcessedStream || localStream;
                streamParaEnvio.getTracks().forEach(track => peer.addTrack(track, streamParaEnvio));
            }

            if (criarOferta) {
                const offer = await peer.createOffer();
                await peer.setLocalDescription(offer);
                socket.emit('signal', userId, { offer });
            }
        }

        socket.on('signal', async (fromId, data) => {
            let peer = peers[fromId];
            if (data.offer) {
                const actualName = remoteVariables[fromId] || "Amiguinho";
                if (!peer) peer = criarPeer(fromId, actualName);
                await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peer.createAnswer();
                await peer.setLocalDescription(answer);
                socket.emit('signal', fromId, { answer });
            } else if (data.answer && peer) {
                await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
            } else if (data.candidate && peer) {
                await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function criarPeer(userId, userVariavel) {
            if (peers[userId]) return peers[userId];

            const peer = new RTCPeerConnection({ iceServers: rtcIceServers });
            peer.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', userId, { candidate: e.candidate }); };

            peer.ontrack = (e) => {
                if (document.getElementById(`caixa-${userId}`)) return;
                const actualName = remoteVariables[userId] || userVariavel || "Amiguinho";
                remoteVariables[userId] = actualName;

                const amigoBox = document.createElement('div');
                amigoBox.className = 'amigo-box';
                amigoBox.id = `caixa-${userId}`;

                const label = document.createElement('label');
                label.id = `label-${userId}`;
                label.style.display = 'block';
                label.style.marginBottom = '4px';
                label.textContent = `🐵 ${actualName}:`;

                const slider = document.createElement('input');
                slider.type = 'range';
                slider.min = '0';
                slider.max = '1';
                slider.step = '0.1';
                slider.value = '1';
                slider.setAttribute('aria-label', `Volume de ${actualName}`);
                slider.addEventListener('input', () => {
                    const audioEl = document.getElementById(`audio-${userId}`);
                    if (audioEl) audioEl.volume = slider.value;
                });

                amigoBox.appendChild(label);
                amigoBox.appendChild(slider);

                const audio = document.createElement('audio');
                audio.id = `audio-${userId}`;
                audio.srcObject = e.streams[0];
                audio.autoplay = true;

                document.getElementById('lista-amigos').appendChild(amigoBox);
                document.getElementById('audios').appendChild(audio);
                iniciarDetectorFalaRemota(userId, e.streams[0]);

                verificarListaVazia();
                atualizarTituloAmigo(userId); 
            };

            peers[userId] = peer;
            return peer;
        }

        socket.on('user-disconnected', (userId) => {
            if (peers[userId]) {
                peers[userId].close();
                delete peers[userId];
                pararDetectorFalaRemota(userId);
                document.getElementById(`caixa-${userId}`)?.remove();
                document.getElementById(`audio-${userId}`)?.remove();
                tocarSomSintetizado('sair');
                verificarListaVazia();
            }
        });

        function verificarListaVazia() {
            const numAmigos = Object.keys(peers).length;
            const totalNaSala = numAmigos + 1;

            const arvoreVisual = document.getElementById('visual-da-arvore');

            arvoreVisual.innerHTML = "";

            const textoSala = getTextoStatusSala(totalNaSala);
            atualizarStatusSalaTopo(totalNaSala);

            const spanLocal = document.createElement('span');
            spanLocal.className = 'macaco-no-galho';
            spanLocal.innerText = '🐵';
            spanLocal.id = 'macaco-local';
            arvoreVisual.appendChild(spanLocal);

            Object.keys(peers).forEach((userId, index) => {
                const spanMacaco = document.createElement('span');
                spanMacaco.className = 'macaco-no-galho';
                spanMacaco.innerText = '🐵';
                spanMacaco.id = `macaco-${userId}`;
                spanMacaco.style.animationDelay = `${(index + 1) * 0.2}s`;
                if (remoteSpeakingState[userId]) spanMacaco.classList.add('falando');
                arvoreVisual.appendChild(spanMacaco);
            });

            atualizarAnimacaoLocalFala(false);
        }

        function enviarMensagem() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg !== "" && salaAtual) {
                adicionarMensagemNaTela(variavelLocal, msg, true);
                socket.emit('chat-message', salaAtual, msg);
                input.value = "";
            }
        }
        function verificarEnter(event) { if (event.key === "Enter") enviarMensagem(); }

        socket.on('chat-message', (id, nick, msg) => { adicionarMensagemNaTela(nick, msg, false); });

        function corDoNome(nome) {
            let hash = 0;
            for (let i = 0; i < nome.length; i++) {
                hash = (hash * 31 + nome.charCodeAt(i)) & 0xffffffff;
            }
            const matiz = Math.abs(hash) % 360;
            return `hsl(${matiz}, 72%, 32%)`;
        }

        function adicionarMensagemNaTela(nome, texto, isMinha) {
            const chatBox = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.classList.add('mensagem');
            if (isMinha) div.classList.add('minha');
            if (nome === 'Sistema') div.classList.add('mensagem-sistema');

            const strong = document.createElement('strong');
            strong.classList.add('nome-autor');
            strong.textContent = `${nome}: `;
            if (nome !== 'Sistema') strong.style.color = corDoNome(nome);
            div.appendChild(strong);
            div.appendChild(document.createTextNode(texto));

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function mutarMicrofone() {
            if (localStream || currentAudioTrack) {
                isMuted = !isMuted;
                if (currentAudioTrack) {
                    currentAudioTrack.enabled = !isMuted;
                } else if (localStream?.getAudioTracks()[0]) {
                    localStream.getAudioTracks()[0].enabled = !isMuted;
                }

                const btn = document.getElementById('btn-mutar');
                btn.innerText = isMuted ? "🙊 Mic Fechado!" : "🐵 Mic Aberto!";
                isMuted ? btn.classList.add('btn-muted') : btn.classList.remove('btn-muted');
                tocarSomSintetizado('mutar');
                atualizarAnimacaoLocalFala(false);
                avaliarQualidadeMicrofone(performance.now(), false);
            }
        }

        try {
            const salaSalva = localStorage.getItem(lastRoomStorageKey);
            if (salaSalva && variavelLocal) {
                setTimeout(() => {
                    if (!salaAtual) entrarNaSala(salaSalva);
                }, 250);
            }
        } catch (err) { }

        function alternarRuido() {
            if (localStream) {
                isNoiseSuppressed = !isNoiseSuppressed;
                atualizarVisualBotaoRuido();
                mostrarToast(isNoiseSuppressed ? '🎧 Filtro Mágico ligado! Ele só age quando você não tá falando.' : '🎧 Filtro Mágico desligado.');
                avaliarQualidadeMicrofone(performance.now(), false);
            }
        }
    </script>
